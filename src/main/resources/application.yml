
server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: drug-code-ser
  datasource:
    url: jdbc:mysql://localhost:3306/drugcodeser?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: your_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  redis:
    host: localhost
    port: 6379
    password:
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

logging:
  charset:
    console: UTF-8
    file: UTF-8
  level:
    com.example.drugcodeser.service: INFO

taobao:
  api:
    server-url: https://gw.api.taobao.com/router/rest
    app-key: 
    app-secret: 
    format: json
    sign-method: md5
    connect-timeout: 30000
    read-timeout: 60000
    ref-ent-id: 
    auth-ref-user-id: 
    from-ref-user-id:
    to-ref-user-id:
    agent-ref-ent-id:
    license: 
    license-token-cache-seconds: 86000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
