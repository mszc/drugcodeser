
server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: drug-code-ser

logging:
  charset:
    console: UTF-8
    file: UTF-8

taobao:
  api:
    server-url: https://gw.api.taobao.com/router/rest
    app-key: 
    app-secret: 
    format: json
    sign-method: md5
    connect-timeout: 30000
    read-timeout: 60000
    ref-ent-id: 
    auth-ref-user-id: 
    from-ref-user-id:
    to-ref-user-id:
    agent-ref-ent-id:
    license: 
    license-token-cache-seconds: 86000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
